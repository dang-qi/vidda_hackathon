services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    # env_file:
    #   - .env
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  backend-data:
